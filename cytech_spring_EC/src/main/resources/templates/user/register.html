<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
<head>
	<meta charset="UTF-8">
	<title>ユーザー新規登録画面</title>
	<link th:href="@{/css/user.css}" rel="stylesheet">
</head>

<body>
	<main class="register">
		<p class="register__title">ユーザー新規登録画面</p>
		
		<div class="register__form">
			<form th:action="@{/user/register}" method="post" th:object="${registerForm}" novalidate>
			
				<div class="register__field">
					<label for="name" class="register__label">ユーザ名</label>
					<input type="text" id="name" th:field="*{name}" class="register__input">
					<p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></p>
				</div>
				
				<div class="register__field">
					<label for="email" class="register__label">メールアドレス</label>
					<input type="email" id="email" th:field="*{email}" class="register__input">
					<p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></p>
				</div>
				
				<div class="register__field">
					<label for="password" class="register__label">パスワード</label>
					<input type="password" id="password" th:field="*{password}" class="register__input">
					<p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></p>
				</div>
				
				<div class="register__field">
					<label for="passwordConfirm" class="register__label">パスワード（確認用）</label>
					<input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" class="register__input">
					<p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" style="color: red;"></p>
				</div>
				
				<div class="register__buttons">
					<button type="submit" class="register__button register__button--submit">登録</button>
					<a th:href="@{/user/login}" class="register__button register__button--back">戻る</a>
				</div>
			
			</form>
		</div>
	</main>
</body>
</html>
