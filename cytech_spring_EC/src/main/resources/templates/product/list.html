<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::title}, ~{::body/content()}, ~{::head})}">

<head>
	<meta charset="UTF-8">
	<title>商品一覧</title>
	<link th:href="@{/css/product.css}" rel="stylesheet">
</head>

<body>
	<main class="product-list">
		<p class="product-list__title">商品一覧画面</p>
		
		<div class="product-list__container">
			
			<div class="product-list__card" th:each="product : ${productList}">
				<a href="#">
					<img th:src="@{${product.imgPath}}" alt="商品1">
					<div class="product-list__card--content">
						<p th:text="${product.productName}"></p>
						<p th:text="${product.company.companyName}"></p>
						<p th:text="'¥' + ${product.price}"></p>
						<p th:text="'¥' + ${product.taxPrice} + '(税込)'"></p>
					</div>
				</a>
			</div>
			
		</div>
	</main>
</body>
</html>
