<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, body, head)">
	
<head>
	<meta charset="UTF-8">
	<link th:href="@{/css/layout.css}" rel="stylesheet"/>
	<th:block th:replace="${head}"></th:block>
	<title th:replace="${title}">Insert title here</title>
</head>

<body>
	<header th:replace="~{common/header :: layout-header}"></header>
	<main id="main" th:replace="${body}"></main>
	<footer th:replace="~{common/footer :: layout-footer}"></footer>
</body>

</html>
