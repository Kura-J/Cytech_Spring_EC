<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>

<body>
	<header th:fragment="layout-header" class="header">
		<div class="header-inner">
			<div class="header-logo">Cytech EC.</div>
			
			<div class="header-search">
				<form th:action="@{/product/list}" method="get">
					<input type="text" name="productName" class="search-input" placeholder="商品名">
					
					<select name="categoryId" class="search-select">
						<option value="">すべて</option>
						<option th:each="category : ${categoryList}"
								th:value="${category.categoryId}"
								th:text="${category.categoryName}">
						</option>
					</select>
					<button type="submit" class="search-button">検索</button>
				</form>
			</div>
			
			<div class="header-user">
				<a href="#" class="header-mypage-button">マイページ</a>
				<div class="user-info">
					<p>ユーザ名：<span th:text="${session.loginUserName}"></span></p>
					<a th:href="@{/logout}" class="logout-button">ログアウト</a>
				</div>
			</div>
			
		</div>
	</header>
</body>

</html>
